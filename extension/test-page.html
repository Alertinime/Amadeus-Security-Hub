<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test extension password</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fa;
        color: #1f2328;
      }

      main {
        width: min(560px, calc(100% - 32px));
        margin: 80px auto;
      }

      form {
        display: grid;
        gap: 16px;
        padding: 24px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background: #ffffff;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }

      input {
        height: 40px;
        padding: 0 12px;
        border: 1px solid #8c959f;
        border-radius: 6px;
        font: inherit;
      }

      button {
        width: fit-content;
        height: 36px;
        padding: 0 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <form>
        <label>
          Email
          <input type="email" autocomplete="username">
        </label>
        <label>
          Mot de passe
          <input type="password" autocomplete="new-password">
        </label>
        <button type="submit">Valider</button>
      </form>
    </main>
  </body>
</html>
