<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Security Hub – Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --bg-accent: #020617;
      --card-bg: rgba(15, 23, 42, 0.94);
      --card-border: rgba(148, 163, 184, 0.35);
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.16);
      --accent-strong: rgba(79, 70, 229, 0.4);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --input-bg: rgba(15, 23, 42, 0.9);
      --input-border: rgba(51, 65, 85, 0.9);
      --radius-xl: 18px;
      --radius-lg: 999px;
      --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.75);
      --shadow-ring: 0 0 0 1px rgba(148, 163, 184, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    .login-shell {
      position: relative;
      width: 100%;
      max-width: 420px;
    }

    /* halo décoratif */
    .halo {
      position: absolute;
      inset: -80px;
      background:
        radial-gradient(circle at 20% 0, rgba(129, 140, 248, 0.22), transparent 55%),
        radial-gradient(circle at 80% 100%, rgba(45, 212, 191, 0.18), transparent 52%);
      filter: blur(2px);
      opacity: 0.9;
      z-index: -1;
    }

    .login-card {
      position: relative;
      background: var(--card-bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      padding: 26px 26px 24px;
      overflow: hidden;
    }

    .card-accent {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 0 0, var(--accent-soft), transparent 55%);
      opacity: 0.7;
      pointer-events: none;
      z-index: -1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 14px;
      background:
        radial-gradient(circle at 30% 0, #e5e7eb, #a5b4fc 40%, #4f46e5 100%);
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.9),
        0 12px 22px rgba(15, 23, 42, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: #020617;
    }

    .title-block h1 {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .title-block p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: var(--radius-lg);
      padding: 4px 9px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      margin-bottom: 14px;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .pill span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .form-block {
      margin-top: 6px;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 7px;
      color: var(--muted);
    }

    .input-wrapper {
      position: relative;
    }

    input[type="password"] {
      width: 100%;
      padding: 11px 38px 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition:
        border-color 0.15s ease,
        box-shadow 0.15s ease,
        background-color 0.15s ease,
        transform 0.08s ease;
    }

    input[type="password"]::placeholder {
      color: rgba(148, 163, 184, 0.9);
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow:
        0 0 0 1px var(--accent-strong),
        0 0 0 14px var(--accent-soft);
      transform: translateY(-1px);
      background: rgba(15, 23, 42, 1);
    }

    .input-icon {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: rgba(148, 163, 184, 0.9);
      pointer-events: none;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      max-width: 60%;
    }

    .hint-strong {
      display: inline-block;
      margin-top: 2px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.95);
    }

    button[type="submit"] {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 9px 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #4f46e5, #22c55e);
      color: #f9fafb;
      box-shadow:
        0 12px 30px rgba(15, 23, 42, 0.85),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      transition:
        transform 0.1s ease,
        box-shadow 0.1s ease,
        filter 0.1s ease;
      white-space: nowrap;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow:
        0 16px 40px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      filter: brightness(1.05);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      filter: brightness(0.98);
    }

    .chevron {
      font-size: 11px;
      opacity: 0.96;
      margin-top: 1px;
    }

    .meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.9;
    }

    .meta span {
      white-space: nowrap;
    }

    .meta-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(148, 163, 184, 0.45),
        transparent
      );
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 22px 18px 20px;
      }

      .title-block h1 {
        font-size: 17px;
      }

      .hint {
        max-width: 100%;
      }

      .bottom-row {
        flex-direction: column;
        align-items: flex-start;
      }

      button[type="submit"] {
        align-self: stretch;
        justify-content: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="halo" aria-hidden="true"></div>

    <section class="login-card" aria-labelledby="login-title">
      <div class="card-accent" aria-hidden="true"></div>

      <div class="header">
        <div class="logo" aria-hidden="true">SH</div>
        <div class="title-block">
          <h1 id="login-title">Déverrouiller Security&nbsp;Hub</h1>
          <p>Tout reste chiffré tant que vous n’êtes pas connecté.</p>
        </div>
      </div>

      <div class="pill">
        <span class="pill-dot"></span>
        <span>Local&nbsp;first · Chiffrement&nbsp;intégral</span>
      </div>

      <form class="form-block" method="post" action="/unlock"  onsubmit="return envoyerMdp(event);">
        <label for="master-password">Mot de passe maître</label>

        <div class="input-wrapper">
          <input
            type="password"
            id="master-password"
            name="master_password"
            autocomplete="current-password"
            placeholder="••••••••••••••"
            required
          />
          <span class="input-icon" aria-hidden="true">✦</span>
        </div>

        <div class="bottom-row">
          <div class="hint">
            Le mot de passe n’est jamais envoyé au serveur.
            <span class="hint-strong">DÉCHIFFREMENT LOCAL UNIQUEMENT</span>
          </div>

          <button type="submit">
            Déverrouiller
            <span class="chevron">➝</span>
          </button>
        </div>
      </form>
      <script>
            function envoyerMdp(event) {
                event.preventDefault(); // bloque le submit classique

                const value = document.getElementById('master-password').value;
                window.pywebview.api.log(value);   // appel Python

                return false; // pour être sûr que rien d’autre ne se passe
            }
    </script>
      <div class="meta" aria-hidden="true">
        <span>Argon2id · AES-256-GCM</span>
        <div class="meta-line"></div>
        <span>Clé physique optionnelle</span>
      </div>
    </section>
  </main>
</body>
</html>
