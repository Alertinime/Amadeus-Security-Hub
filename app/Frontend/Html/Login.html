<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Security Hub - Connexion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="securityhub.css" />
</head>
<body>
  <main class="login-shell">
    <div class="halo" aria-hidden="true"></div>

    <section class="login-card" aria-labelledby="login-title">
      <div class="card-accent" aria-hidden="true"></div>

      <div class="header">
        <div class="logo" aria-hidden="true">SH</div>
        <div class="title-block">
          <h1 id="login-title">Deverrouiller Security Hub</h1>
          <p>Tout reste chiffre tant que vous n'etes pas connecte.</p>
        </div>
      </div>

      <div class="pill">
        <span class="pill-dot"></span>
        <span>Local first | Chiffrement integral</span>
      </div>

      <form class="form-block" method="post" action="/unlock">
        <label for="master-password">Mot de passe maitre</label>

        <div class="input-wrapper">
          <input
            type="password"
            id="master-password"
            name="master_password"
            autocomplete="current-password"
            placeholder="................"
            required
          />
          <span class="input-icon" aria-hidden="true">*</span>
        </div>

        <p
          id="login-error"
          class="form-error"
          aria-live="polite"
        ></p>

        <div class="bottom-row">
          <div class="hint">
            Le mot de passe n'est jamais envoye au serveur.
            <span class="hint-strong">DECHIFFREMENT LOCAL UNIQUEMENT</span>
          </div>

          <button type="submit">
            Deverrouiller
            <span class="chevron">&gt;</span>
          </button>
        </div>
      </form>

      <div class="meta" aria-hidden="true">
        <span>Argon2id | AES-256-GCM</span>
        <div class="meta-line"></div>
        <span>Cle physique optionnelle</span>
      </div>
    </section>
  </main>

  <script src="JS/common.js"></script>
  <script src="JS/login.js"></script>
</body>
</html>
